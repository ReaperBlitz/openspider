name: OpenSpider

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  crawl:
    name: OpenSpider Crawl

    runs-on: ubuntu-latest

    timeout-minutes: 20

    concurrency:
      group: openspider-crawl
      cancel-in-progress: false

    steps:
      # ================= CHECKOUT =================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= NODE =================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ================= INSTALL =================

      - name: Install Dependencies
        run: npm install axios cheerio

      # ================= RUN =================

      - name: Run OpenSpider
        run: node crawler.js
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # ================= SAVE STATE =================

      - name: Commit Updated State
        run: |
          git config --global user.name "OpenSpider Bot"
          git config --global user.email "bot@openspider.local"

          git add data/state.json

          git commit -m "Update OpenSpider state" || echo "No changes"

          git push
