name: OpenSpider

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  crawl:
    name: OpenSpider Crawl

    runs-on: ubuntu-latest

    # MAXIMUM WORKFLOW RUNTIME
    timeout-minutes: 30

    concurrency:
      group: openspider-crawl
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Run OpenSpider
        run: node crawler.js
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit Updated State
        run: |
          git config --global user.name "OpenSpider Bot"
          git config --global user.email "bot@openspider.local"

          git add data/state.json

          git diff --cached --quiet || git commit -m "Update OpenSpider state"

          git push
